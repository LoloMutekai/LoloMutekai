  <line x1="144" y1="124" x2="148" y2="124" stroke="#5a6070"  stroke-width=".7" opacity=".6"/>
  <line x1="144" y1="200" x2="148" y2="200" stroke="#c98ba0"  stroke-width=".9" opacity=".7"/>
  <line x1="144" y1="284" x2="148" y2="284" stroke="#5a6070"  stroke-width=".7" opacity=".5"/>
  <line x1="144" y1="348" x2="148" y2="348" stroke="#7fb8c8"  stroke-width=".7" opacity=".55"/>
</g>

