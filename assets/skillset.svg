  <polyline points="12,410 12,428 30,428" stroke="#2a2730" stroke-width=".85" fill="none"/>
  <polyline points="970,410 970,428 952,428" stroke="#2a2730" stroke-width=".85" fill="none"/>
  <text x="34"  y="20"  class="µ">SKILL.STRATA</text>
  <text x="700" y="20"  class="µc">KAIRO / SUBSTRATE · v1</text>
  <text x="34"  y="432" class="µ">床の間</text>
  <text x="820" y="432" class="µ">LOLOMUTEKAI · 2026</text>
  <text x="500" y="32"  text-anchor="middle" class="hud">A R C H I T E C T U R E · D E S · C O U C H E S</text>
  <!-- séparateur colonne labels -->
  <line x1="148" y1="50" x2="148" y2="400" stroke="#2a2730" stroke-width=".65"/>
