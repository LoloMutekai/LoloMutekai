<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" fill="none" role="img" aria-label="strata — skill substrate · LoloMutekai">
<defs>
  <style>
    .lbl   { font-family:'Courier New',Courier,monospace; font-size:12px;  fill:#8a93a6; letter-spacing:1.4px; }
    .lbl-t { font-family:'Courier New',Courier,monospace; font-size:12px;  fill:#c98ba0; letter-spacing:1.4px; }
    .lbl-c { font-family:'Courier New',Courier,monospace; font-size:12px;  fill:#7fb8c8; letter-spacing:1.4px; }
    .t0    { font-family:'Courier New',Courier,monospace; font-size:16px; fill:#8a93a6; }
    .tell  { font-family:'Courier New',Courier,monospace; font-size:16px; fill:#c98ba0; }
    .cyan  { font-family:'Courier New',Courier,monospace; font-size:16px; fill:#7fb8c8; }
    .mut   { font-family:'Courier New',Courier,monospace; font-size:16px; fill:#8a93a6; opacity:.45; }
    .µ     { font-family:'Courier New',Courier,monospace; font-size:10px;  fill:#8a93a6; fill-opacity:.45; letter-spacing:.8px; }
    .µc    { font-family:'Courier New',Courier,monospace; font-size:10px;  fill:#7fb8c8; fill-opacity:.42; letter-spacing:.8px; }
    .µr    { font-family:'Courier New',Courier,monospace; font-size:10px;  fill:#c98ba0; fill-opacity:.55; letter-spacing:.8px; }
    .hud   { font-family:'Courier New',Courier,monospace; font-size:10px;  fill:#8a93a6; letter-spacing:2px; }
    .ann   { font-family:'Courier New',Courier,monospace; font-size:10.5px; fill:#c98ba0; fill-opacity:.60; }

    /* ── ANIMATIONS ─────────────────────────────────────────────── */
    @keyframes strate-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes line-draw {
      from { stroke-dashoffset: 1000; opacity: 0; }
      to   { stroke-dashoffset: 0;    opacity: 1; }
    }
    @keyframes breathe {
      0%,100% { opacity: 1; }
      50%     { opacity: .55; }
    }
    @keyframes hud-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── STRATE 1 ── */
    .s1 { animation: strate-in .55s cubic-bezier(0.22,1,0.36,1) 0.10s both; }
    .s1-t1 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.20s both; }
    .s1-t2 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.24s both; }
    .s1-t3 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
    .s1-t4 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.32s both; }
    .s1-t5 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.36s both; }
    .s1-t6 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.40s both; }
    .line-s1 { stroke-dasharray: 1000; animation: line-draw .5s ease-out 0.48s both; }

    /* ── STRATE 2 ── */
    .s2 { animation: strate-in .55s cubic-bezier(0.22,1,0.36,1) 0.55s both; }
    .s2-t1 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.62s both; }
    .s2-t2 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.66s both; }
    .s2-t3 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.70s both; }
    .s2-t4 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.74s both; }
    .s2-t5 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.78s both; }
    .s2-ann { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 0.88s both; }
    .s2-accent {
      animation:
        strate-in .55s cubic-bezier(0.22,1,0.36,1) 0.55s both,
        breathe 3.5s ease-in-out 1.3s infinite;
    }
    .line-s2 { stroke-dasharray: 1000; animation: line-draw .5s ease-out 0.95s both; }

    /* ── STRATE 3 ── */
    .s3 { animation: strate-in .55s cubic-bezier(0.22,1,0.36,1) 1.00s both; }
    .s3-t1 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.08s both; }
    .s3-t2 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.12s both; }
    .s3-t3 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.16s both; }
    .s3-t4 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.20s both; }
    .s3-t5 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.24s both; }
    .s3-t6 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.28s both; }
    .s3-t7 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.32s both; }
    .s3-t8 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.36s both; }
    .line-s3 { stroke-dasharray: 1000; animation: line-draw .5s ease-out 1.45s both; }

    /* ── STRATE 4 ── */
    .s4 { animation: strate-in .55s cubic-bezier(0.22,1,0.36,1) 1.48s both; }
    .s4-t1 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.55s both; }
    .s4-t2 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.60s both; }
    .s4-t3 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.65s both; }
    .line-s4 { stroke-dasharray: 1000; animation: line-draw .5s ease-out 1.72s both; }

    /* ── STRATE 5 ── */
    .s5 { animation: strate-in .55s cubic-bezier(0.22,1,0.36,1) 1.75s both; }
    .s5-t1 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.83s both; }
    .s5-t2 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.87s both; }
    .s5-t3 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.91s both; }
    .s5-t4 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.95s both; }
    .s5-t5 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 1.99s both; }
    .s5-t6 { animation: strate-in .45s cubic-bezier(0.22,1,0.36,1) 2.03s both; }
    .line-s5 { stroke-dasharray: 1000; animation: line-draw .5s ease-out 2.15s both; }

    .hud-frame { animation: hud-in .6s ease-out 0.05s both; }
    .baseline  { animation: hud-in .5s ease-out 2.20s both; }
    .deco      { animation: hud-in .8s ease-out 2.00s both; }
  </style>

  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0"  stop-color="#0d0e12"/>
    <stop offset="1"  stop-color="#0f1019"/>
  </linearGradient>
  <!-- halo transparent aux bords -->
  <radialGradient id="halobg" cx="500" cy="220" r="480" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#0d0e12" stop-opacity="1"/>
    <stop offset="62%"  stop-color="#0d0e12" stop-opacity="1"/>
    <stop offset="78%"  stop-color="#0d0e12" stop-opacity=".65"/>
    <stop offset="90%"  stop-color="#0d0e12" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#0d0e12" stop-opacity="0"/>
  </radialGradient>
  <!-- mask cadre 4 bords -->
  <linearGradient id="st-fade-left" x1="0" y1="0" x2="30" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="0"/>
    <stop offset="1" stop-color="white" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="st-fade-right" x1="970" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="1"/>
    <stop offset="1" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="st-fade-top" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="0"/>
    <stop offset="1" stop-color="white" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="st-fade-bottom" x1="0" y1="400" x2="0" y2="440" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="1"/>
    <stop offset="1" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <mask id="edge-fade" maskUnits="userSpaceOnUse" x="0" y="0" width="1000" height="440">
    <rect x="30" y="40" width="940" height="360" fill="white"/>
    <rect x="0"   y="0" width="30"   height="440" fill="url(#st-fade-left)"/>
    <rect x="970" y="0" width="30"   height="440" fill="url(#st-fade-right)"/>
    <rect x="0"   y="0" width="1000" height="40"  fill="url(#st-fade-top)"/>
    <rect x="0" y="400" width="1000" height="40"  fill="url(#st-fade-bottom)"/>
  </mask>
  <linearGradient id="alt-fill" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#1c1820" stop-opacity=".55"/>
    <stop offset=".6"  stop-color="#18151e" stop-opacity=".35"/>
    <stop offset="1"   stop-color="#0d0e12" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="tell-band" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#c98ba0" stop-opacity=".1"/>
    <stop offset=".5"  stop-color="#c98ba0" stop-opacity=".04"/>
    <stop offset="1"   stop-color="#c98ba0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="cyan-band" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#7fb8c8" stop-opacity=".08"/>
    <stop offset=".5"  stop-color="#7fb8c8" stop-opacity=".03"/>
    <stop offset="1"   stop-color="#7fb8c8" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".7">
    <stop offset=".55" stop-color="#0d0e12" stop-opacity="0"/>
    <stop offset="1"   stop-color="#0d0e12" stop-opacity=".45"/>
  </radialGradient>
</defs>

<!-- fond halo transparent aux bords -->
<rect width="1000" height="440" fill="url(#halobg)" mask="url(#edge-fade)"/>

<g mask="url(#edge-fade)">

