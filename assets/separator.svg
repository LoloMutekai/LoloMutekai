<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="120" viewBox="0 0 1000 120" fill="none" role="img" aria-label="tokonoma separator">
<defs>
  <!-- mask cadre 4 bords : fade sur les extrémités latérales uniquement (pas de fond) -->
  <linearGradient id="sep-fade-left" x1="0" y1="0" x2="50" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="0"/>
    <stop offset="1" stop-color="white" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="sep-fade-right" x1="950" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="1"/>
    <stop offset="1" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <mask id="edge-fade" maskUnits="userSpaceOnUse" x="0" y="0" width="1000" height="120">
    <rect x="50" y="0" width="900" height="120" fill="white"/>
    <rect x="0"   y="0" width="50"  height="120" fill="url(#sep-fade-left)"/>
    <rect x="950" y="0" width="50"  height="120" fill="url(#sep-fade-right)"/>
  </mask>
  <!-- gradient central pour filet médian -->
  <linearGradient id="wave-fade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#5a6070" stop-opacity="0"/>
    <stop offset=".18" stop-color="#5a6070" stop-opacity=".55"/>
    <stop offset=".38" stop-color="#5a6070" stop-opacity=".30"/>
    <stop offset=".5"  stop-color="#5a6070" stop-opacity="0"/>
    <stop offset=".62" stop-color="#5a6070" stop-opacity=".30"/>
    <stop offset=".82" stop-color="#5a6070" stop-opacity=".55"/>
    <stop offset="1"   stop-color="#5a6070" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="tell-wave" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#c98ba0" stop-opacity="0"/>
    <stop offset=".28" stop-color="#c98ba0" stop-opacity=".38"/>
    <stop offset=".5"  stop-color="#c98ba0" stop-opacity=".12"/>
    <stop offset=".72" stop-color="#c98ba0" stop-opacity=".38"/>
    <stop offset="1"   stop-color="#c98ba0" stop-opacity="0"/>
  </linearGradient>
  <style>
    @keyframes breathe { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes draw { to{stroke-dashoffset:0} }
    .fl { animation: draw 2.8s ease-out 0.3s forwards; }
    .fl2{ animation: draw 3.2s ease-out 0.6s forwards; }
    .fl3{ animation: draw 2.5s ease-out 0.9s forwards; }
    .petal { animation: breathe 5s ease-in-out 1.4s infinite; }
  </style>
</defs>

<!-- PAS de fond : fond 100% transparent, on pose directement les éléments -->

<g mask="url(#edge-fade)">

  <!-- filet central fin -->
  <line x1="0" y1="60" x2="1000" y2="60" stroke="url(#wave-fade)" stroke-width=".8"/>

  <!-- ondulations — gauche (plus lumineuses, stroke plus épais, extrémités estompées via opacity sur les paths finaux) -->
  <!-- mask interne pour estomper les extrémités côté centre -->
  <defs>
    <linearGradient id="wave-end-l" x1="380" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-end-r" x1="620" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="wave-mask-l" maskUnits="userSpaceOnUse" x="0" y="0" width="500" height="120">
      <rect x="0"   y="0" width="380" height="120" fill="white"/>
      <rect x="380" y="0" width="100" height="120" fill="url(#wave-end-l)"/>
    </mask>
    <mask id="wave-mask-r" maskUnits="userSpaceOnUse" x="500" y="0" width="500" height="120">
      <rect x="620" y="0" width="380" height="120" fill="white"/>
      <rect x="520" y="0" width="100" height="120" fill="url(#wave-end-r)"/>
    </mask>
  </defs>
  <g mask="url(#wave-mask-l)">
    <path class="fl" fill="none" stroke="#6a7585" stroke-width="1.4" opacity=".88"
          stroke-dasharray="520" stroke-dashoffset="520"
          d="M 0,60 C 55,32 110,88 180,60 C 250,34 310,86 390,60 C 430,47 455,55 475,60"/>
    <path class="fl2" fill="none" stroke="#8a93a6" stroke-width="1.1" opacity=".72"
          stroke-dasharray="420" stroke-dashoffset="420"
          d="M 0,60 C 45,40 95,80 160,60 C 225,42 285,78 360,60 C 400,49 430,56 460,60"/>
    <path class="fl3" fill="none" stroke="#c98ba0" stroke-width="1.6" opacity=".72"
          stroke-dasharray="380" stroke-dashoffset="380"
          d="M 0,60 C 60,44 115,76 185,60 C 255,46 310,74 380,60 C 415,52 440,57 465,60"/>
  </g>

  <g mask="url(#wave-mask-r)">
    <path class="fl" fill="none" stroke="#6a7585" stroke-width="1.4" opacity=".88"
          stroke-dasharray="520" stroke-dashoffset="520"
          d="M 1000,60 C 945,32 890,88 820,60 C 750,34 690,86 610,60 C 570,47 545,55 525,60"/>
    <path class="fl2" fill="none" stroke="#8a93a6" stroke-width="1.1" opacity=".72"
          stroke-dasharray="420" stroke-dashoffset="420"
          d="M 1000,60 C 955,40 905,80 840,60 C 775,42 715,78 640,60 C 600,49 570,56 540,60"/>
    <path class="fl3" fill="none" stroke="#c98ba0" stroke-width="1.6" opacity=".72"
          stroke-dasharray="380" stroke-dashoffset="380"
          d="M 1000,60 C 940,44 885,76 815,60 C 745,46 690,74 620,60 C 585,52 560,57 535,60"/>
  </g>

  <!-- fleur centrale — 6 pétales aplatis (spirale chrysanthème) — inchangée -->
  <g transform="translate(500,60)" class="petal">
    <ellipse rx="18" ry="5" fill="none" stroke="#9c6f80" stroke-width=".7" opacity=".65"
             transform="rotate(0)"/>
    <ellipse rx="18" ry="5" fill="none" stroke="#9c6f80" stroke-width=".7" opacity=".65"
             transform="rotate(30)"/>
    <ellipse rx="18" ry="5" fill="none" stroke="#c98ba0" stroke-width="1.0" opacity=".60"
             transform="rotate(60)"/>
    <ellipse rx="18" ry="5" fill="none" stroke="#9c6f80" stroke-width=".7" opacity=".65"
             transform="rotate(90)"/>
    <ellipse rx="18" ry="5" fill="none" stroke="#9c6f80" stroke-width=".7" opacity=".65"
             transform="rotate(120)"/>
    <ellipse rx="18" ry="5" fill="none" stroke="#c98ba0" stroke-width="1.0" opacity=".60"
             transform="rotate(150)"/>
    <circle r="4.5" fill="none" stroke="#8a93a6" stroke-width=".65" opacity=".55"/>
    <circle r="1.8" fill="#c98ba0" opacity=".50"/>
  </g>

  <!-- micro dots flanquant la fleur -->
  <circle cx="462" cy="60" r="1.2" fill="#8a93a6" opacity=".45"/>
  <circle cx="472" cy="60" r=".8"  fill="#8a93a6" opacity=".32"/>
  <circle cx="482" cy="60" r=".6"  fill="#8a93a6" opacity=".25"/>
  <circle cx="518" cy="60" r="1.2" fill="#8a93a6" opacity=".45"/>
  <circle cx="528" cy="60" r=".8"  fill="#8a93a6" opacity=".32"/>
  <circle cx="538" cy="60" r=".6"  fill="#8a93a6" opacity=".25"/>

  <!-- ligne tell légère centrée -->
  <line x1="300" y1="60" x2="700" y2="60" stroke="url(#tell-wave)" stroke-width=".7"/>

</g>
</svg>
